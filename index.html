<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>记忆管理面板 v9.3</title>
<style>
:root{--p:#7657c8;--p2:#9b7be8;--bg:#f7f3ff;--card:#fff;--line:#e7def7;--text:#24212a;--muted:#777;--ok:#28a36a;--bad:#c0392b}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}.hero{background:linear-gradient(135deg,var(--p),var(--p2));color:white;padding:22px 18px}.hero h1{margin:0 0 8px;font-size:24px}.hero p{margin:0;opacity:.92}.wrap{max-width:1100px;margin:0 auto;padding:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 8px 28px rgba(84,54,150,.08)}label{display:block;margin:10px 0 6px;color:#666;font-size:14px}input,select,textarea{width:100%;border:1px solid #ddd;border-radius:12px;padding:11px 12px;background:#fff;font-size:15px}textarea{min-height:110px;resize:vertical}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.btns{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}button{border:0;border-radius:12px;padding:11px 18px;background:var(--p);color:white;font-size:15px;font-weight:700}button.secondary{background:#eee;color:#333}button.green{background:var(--ok)}button.red{background:var(--bad)}button:disabled{opacity:.55}.status{margin-top:12px;padding:12px;border-radius:12px;background:#fff7d7;color:#6d5c1e;white-space:pre-wrap}.status.ok{background:#e8fff3;color:#12613f}.status.bad{background:#ffecec;color:#8a1f1f}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:10px}.tab{background:#eee;color:#555}.tab.active{background:var(--p);color:#fff}.table{overflow:auto;border:1px solid var(--line);border-radius:14px;margin-top:12px}table{width:100%;border-collapse:collapse;min-width:760px}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{background:#fbf8ff}.content{max-width:420px;white-space:pre-wrap;word-break:break-word}.small{font-size:13px;color:var(--muted)}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eee;color:#555}.hide{display:none!important}@media(max-width:700px){.grid,.grid3{grid-template-columns:1fr}.hero h1{font-size:22px}.wrap{padding:10px}.card{padding:13px;border-radius:14px}button{width:100%}.btns{gap:8px}.tabs button{width:auto}}
</style>
</head>
<body>
<div class="hero"><h1>记忆管理面板 v9.3</h1><p>后端代理版：不在浏览器填写 Supabase key；按人设隔离，会话互通。</p></div>
<div class="wrap">
  <div class="card">
    <div class="grid">
      <div><label>面板密码 / API_SECRET</label><input id="apiKey" type="password" placeholder="例如 lyy123" autocomplete="current-password"></div>
      <div><label>连接状态</label><div id="status" class="status">未连接。输入 API_SECRET 后点“连接网关”。</div></div>
    </div>
    <div class="btns"><button onclick="connect()" class="green">连接网关</button><button onclick="clearKey()" class="secondary">清空本地密码</button></div>
  </div>

  <div class="card">
    <div class="tabs"><button id="tabMem" class="tab active" onclick="switchTab('memory')">精华记忆</button><button id="tabArc" class="tab" onclick="switchTab('archive')">对话归档</button></div>
    <div class="grid3">
      <div><label>人设</label><select id="persona"></select></div>
      <div id="catBox"><label>分类</label><select id="category"><option value="">全部分类</option><option>喜好</option><option>雷点</option><option>设定</option><option>关系</option><option>剧情</option><option>档案</option></select></div>
      <div id="roleBox" class="hide"><label>角色</label><select id="role"><option value="">全部 role</option><option>user</option><option>assistant</option><option>system</option></select></div>
    </div>
    <div class="grid3">
      <div><label>关键词</label><input id="q" placeholder="搜索内容关键词，可留空"></div>
      <div><label>每页条数</label><select id="pageSize"><option>20</option><option>50</option></select></div>
      <div><label>页码跳转</label><input id="pageInput" type="number" min="1" value="1"></div>
    </div>
    <div class="btns"><button onclick="loadRecords(1)">查询</button><button onclick="prevPage()" class="secondary">上一页</button><button onclick="nextPage()" class="secondary">下一页</button><button onclick="jumpPage()" class="secondary">跳转</button></div>
    <div id="pageInfo" class="small" style="margin-top:10px">第 0 / 0 页，共 0 条</div>
    <div class="table"><table><thead id="thead"></thead><tbody id="tbody"></tbody></table></div>
  </div>

  <div class="card">
    <h2 id="formTitle" style="margin-top:0">添加精华记忆</h2>
    <p class="small">精华记忆会被 AI 检索；对话归档只是原文备份。同一人设下不按 conversation_id 分隔，适合一条线走到底。</p>
    <input id="editId" type="hidden">
    <div class="grid">
      <div><label>人设</label><select id="formPersona"></select></div>
      <div id="formCategoryBox"><label>分类</label><select id="formCategory"><option>喜好</option><option>雷点</option><option>设定</option><option>关系</option><option>剧情</option><option>档案</option></select></div>
      <div id="formRoleBox" class="hide"><label>role</label><select id="formRole"><option>user</option><option>assistant</option><option>system</option></select></div>
      <div><label>conversation_id，可留空</label><input id="conversationId" value="manual"></div>
    </div>
    <label>内容</label><textarea id="content" placeholder="精华记忆建议：[剧情] ……"></textarea>
    <div class="btns"><button onclick="saveRow()" class="green">新增 / 保存</button><button onclick="resetForm()" class="secondary">取消编辑/清空</button></div>
  </div>
</div>
<script>
let mode='memory', page=1, total=0, totalPages=0, personas=[];
const $=id=>document.getElementById(id);
function key(){return $('apiKey').value.trim()||localStorage.getItem('panel_api_key')||''}
function setStatus(msg,type){const el=$('status');el.className='status '+(type||'');el.textContent=msg}
async function api(path,opt={}){const k=key();if(!k)throw new Error('请先输入面板密码 / API_SECRET');const headers=Object.assign({'x-api-key':k},opt.headers||{});if(opt.body && !(opt.body instanceof FormData))headers['content-type']='application/json';const r=await fetch(path,Object.assign({},opt,{headers}));const text=await r.text();let data;try{data=JSON.parse(text)}catch(e){data={raw:text}}if(!r.ok||data.error)throw new Error(data.error||data.message||text||('HTTP '+r.status));return data}
function clearKey(){localStorage.removeItem('panel_api_key');$('apiKey').value='';setStatus('已清空本地密码。','')}
async function connect(){try{setStatus('正在连接网关并读取人设……','');localStorage.setItem('panel_api_key',$('apiKey').value.trim());const data=await api('/api/panel/personas');personas=data.data||[];fillPersonas();setStatus('✅ 已连接，加载人设 '+personas.length+' 个。','ok');if(personas.length)await loadRecords(1)}catch(e){setStatus('❌ 连接失败：'+e.message,'bad')}}
function fillPersonas(){const opts=personas.map(p=>'<option value="'+esc(p.persona_name)+'">'+esc(p.display_name||p.persona_name)+'</option>').join('');$('persona').innerHTML=opts;$('formPersona').innerHTML=opts}
function switchTab(m){mode=m;page=1;$('tabMem').classList.toggle('active',m==='memory');$('tabArc').classList.toggle('active',m==='archive');$('catBox').classList.toggle('hide',m!=='memory');$('roleBox').classList.toggle('hide',m!=='archive');$('formCategoryBox').classList.toggle('hide',m!=='memory');$('formRoleBox').classList.toggle('hide',m!=='archive');$('formTitle').textContent=m==='memory'?'添加精华记忆':'添加对话归档';$('pageSize').innerHTML=m==='memory'?'<option>20</option><option>50</option>':'<option>5</option><option>10</option><option>20</option>';resetForm();loadRecords(1)}
async function loadRecords(p){try{page=p||1;const params=new URLSearchParams({type:mode,persona:$('persona').value||'',q:$('q').value||'',page:String(page),page_size:$('pageSize').value});if(mode==='memory')params.set('category',$('category').value||'');else params.set('role',$('role').value||'');const data=await api('/api/panel/records?'+params.toString());total=data.total||0;totalPages=data.total_pages||0;renderRows(data.data||[]);$('pageInfo').textContent='第 '+page+' / '+totalPages+' 页，共 '+total+' 条';$('pageInput').value=page}catch(e){setStatus('❌ 查询失败：'+e.message,'bad')}} 
function renderRows(rows){if(mode==='memory'){$('thead').innerHTML='<tr><th>时间</th><th>人设</th><th>分类</th><th>内容</th><th>操作</th></tr>';$('tbody').innerHTML=rows.map(r=>'<tr><td>'+esc((r.created_at||'').slice(0,16))+'</td><td>'+esc(r.assistant_id||'')+'</td><td><span class="pill">'+esc(r.category||'')+'</span></td><td class="content">'+esc(r.content||'')+'</td><td>'+ops(r)+'</td></tr>').join('')}else{$('thead').innerHTML='<tr><th>时间</th><th>人设</th><th>role</th><th>内容</th><th>操作</th></tr>';$('tbody').innerHTML=rows.map(r=>'<tr><td>'+esc((r.created_at||'').slice(0,16))+'</td><td>'+esc(r.assistant_id||'')+'</td><td><span class="pill">'+esc(r.role||'')+'</span></td><td class="content">'+esc(r.content||'')+'</td><td>'+ops(r)+'</td></tr>').join('')}}
function ops(r){return '<button class="secondary" onclick=\'editRow('+JSON.stringify(r).replace(/'/g,'&#39;')+')\'>编辑</button> <button class="red" onclick="deleteRow(\''+r.id+'\')">删除</button>'}
function prevPage(){if(page>1)loadRecords(page-1)}function nextPage(){if(page<totalPages)loadRecords(page+1)}function jumpPage(){let p=parseInt($('pageInput').value||'1',10);if(p<1)p=1;if(totalPages&&p>totalPages)p=totalPages;loadRecords(p)}async function saveRow(){try{const body={type:mode,id:$('editId').value||'',persona:$('formPersona').value,conversation_id:$('conversationId').value||'manual',content:$('content').value||''};if(mode==='memory')body.category=$('formCategory').value;else body.role=$('formRole').value;const data=await api('/api/panel/record',{method:body.id?'PATCH':'POST',body:JSON.stringify(body)});setStatus('✅ 已保存：'+(data.id||body.id||''),'ok');resetForm();loadRecords(page)}catch(e){setStatus('❌ 保存失败：'+e.message,'bad')}}
function editRow(r){$('editId').value=r.id||'';$('formPersona').value=r.assistant_id||'';$('conversationId').value=r.conversation_id||'manual';$('content').value=r.content||'';if(mode==='memory')$('formCategory').value=(r.category||'剧情').replace(/[\[\]]/g,'');else $('formRole').value=r.role||'user';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}) }
async function deleteRow(id){if(!confirm('确定删除这条记录？'))return;try{await api('/api/panel/record',{method:'DELETE',body:JSON.stringify({type:mode,id})});setStatus('✅ 已删除。','ok');loadRecords(page)}catch(e){setStatus('❌ 删除失败：'+e.message,'bad')}}
function resetForm(){$('editId').value='';$('conversationId').value='manual';$('content').value=''}function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
window.addEventListener('DOMContentLoaded',()=>{const k=localStorage.getItem('panel_api_key');if(k){$('apiKey').value=k;connect()}});
</script>
</body>
</html>
