<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍊 橘瓣记忆库 · 甜蜜管理面板</title>
<style>
  :root {
    /* 甜蜜配色：奶油粉 + 蜜桃 + 薰衣草 */
    --bg-1: #fff5f7; --bg-2: #ffe8ee; --bg-3: #f3e8ff;
    --card: rgba(255, 255, 255, 0.72);
    --card-solid: #ffffff;
    --border: rgba(255, 182, 193, 0.45);
    --text: #5a4a52; --text-soft: #9b8a93; --muted: #c4b5bd;
    --accent: #ff7eb3; --accent-2: #ff9a8b; --accent-grad: linear-gradient(135deg, #ff9a8b 0%, #ff6a88 50%, #ff99ac 100%);
    --accent-soft: rgba(255, 126, 179, 0.12);
    --danger: #ff6b81; --ok: #6bcb77; --warn: #ffa45c;
    /* 标签糖果色 */
    --tag-rel: #ff6b9d; --tag-plot: #c084fc; --tag-like: #4ade80;
    --tag-hate: #f87171; --tag-set: #60a5fa; --tag-doc: #fbbf24;
    --radius: 16px; --radius-sm: 10px;
    --shadow: 0 8px 32px rgba(255, 126, 179, 0.15), 0 2px 8px rgba(192, 132, 252, 0.08);
    --shadow-soft: 0 4px 16px rgba(255, 126, 179, 0.1);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 40%, var(--bg-3) 100%);
    background-attachment: fixed; color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .hidden { display: none !important; }

  /* 顶栏 — 毛玻璃 */
  header { position: sticky; top: 0; z-index: 100;
    background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border); padding: 12px 16px;
    box-shadow: var(--shadow-soft); }
  .header-row { display: flex; align-items: center; gap: 10px; }
  .header-row h1 { font-size: 18px; margin: 0; background: var(--accent-grad);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; flex: 1; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); box-shadow: 0 0 8px rgba(0,0,0,0.1); }
  .status-dot.ok { background: var(--ok); box-shadow: 0 0 8px rgba(107,203,119,0.5); }
  .status-dot.err { background: var(--danger); box-shadow: 0 0 8px rgba(255,107,129,0.5); }

  /* 连接区 */
  .connect { padding: 24px 16px; }
  .connect-card { background: var(--card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 20px; box-shadow: var(--shadow); }
  .connect-card .title { font-size: 20px; font-weight: 800; background: var(--accent-grad);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
  .connect-card .desc { font-size: 13px; color: var(--text-soft); margin-bottom: 16px; }
  .connect input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
    font-size: 15px; transition: all 0.2s; margin-bottom: 12px; }
  .connect input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }

  /* 按钮 */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 4px;
    padding: 10px 20px; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    cursor: pointer; background: rgba(255,255,255,0.7); color: var(--text);
    border: 1.5px solid var(--border); transition: all 0.2s; }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent-grad); color: #fff; border: none;
    box-shadow: 0 4px 12px rgba(255,106,136,0.3); }
  .btn-primary:active { box-shadow: 0 2px 6px rgba(255,106,136,0.3); }
  .btn-danger { background: linear-gradient(135deg, #ff8a80, #ff5252); color: #fff; border: none; }
  .btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

  /* Tabs — 胶囊 */
  .tabs { display: flex; gap: 6px; padding: 12px 16px 6px; }
  .tab { flex: 1; padding: 10px 14px; text-align: center; cursor: pointer;
    border-radius: 12px; color: var(--text-soft); font-weight: 600; font-size: 13px;
    background: rgba(255,255,255,0.4); border: 1.5px solid transparent; transition: all 0.2s; }
  .tab.active { color: #fff; background: var(--accent-grad); border-color: transparent;
    box-shadow: 0 4px 12px rgba(255,106,136,0.25); }

  /* 筛选栏 */
  .filters { padding: 8px 16px 12px; display: grid; gap: 8px; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  select, .filters input { padding: 9px 12px; background: rgba(255,255,255,0.6);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
    font-size: 13px; transition: all 0.2s; }
  select:focus, .filters input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  select { flex: 1; min-width: 0; }
  .filters input { flex: 1; min-width: 0; }

  /* 列表卡片 */
  .list { padding: 4px 16px 100px; }
  .item { background: var(--card); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 10px; box-shadow: var(--shadow-soft); transition: all 0.2s; }
  .item:active { transform: scale(0.99); }
  .item-head { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .tag { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 11px;
    font-weight: 700; color: #fff; letter-spacing: 0.5px; }
  .tag-关系 { background: var(--tag-rel); } .tag-剧情 { background: var(--tag-plot); }
  .tag-喜好 { background: var(--tag-like); } .tag-雷点 { background: var(--tag-hate); }
  .tag-设定 { background: var(--tag-set); } .tag-档案 { background: var(--tag-doc); }
  .role-tag { padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .role-user { background: rgba(96,165,250,0.18); color: #3b82f6; }
  .role-assistant { background: rgba(192,132,252,0.18); color: #a855f7; }
  .role-system { background: rgba(251,191,36,0.18); color: #d97706; }
  .item-time { font-size: 11px; color: var(--muted); margin-left: auto; }
  .item-content { white-space: pre-wrap; word-break: break-word; color: var(--text); font-size: 14px; line-height: 1.65; }
  .item-content.clamp { max-height: 5em; overflow: hidden; position: relative; }
  .item-content.clamp::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1.5em;
    background: linear-gradient(transparent, rgba(255,255,255,0.85)); pointer-events: none; }
  .item-actions { display: flex; gap: 6px; margin-top: 10px; }
  .expand-btn { color: var(--accent); font-size: 12px; font-weight: 600; cursor: pointer; user-select: none; margin-top: 6px; }

  /* 分页 */
  .pager { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 12px; flex-wrap: wrap; }
  .pager .info { font-size: 12px; color: var(--text-soft); width: 100%; text-align: center; margin-bottom: 6px; }
  .pager input[type=number] { width: 56px; padding: 5px 8px; text-align: center; border-radius: 8px;
    border: 1.5px solid var(--border); background: rgba(255,255,255,0.6); color: var(--text); font-size: 13px; }

  /* FAB 浮动按钮 */
  .fab { position: fixed; right: 20px; bottom: 24px; width: 56px; height: 56px; border-radius: 50%;
    background: var(--accent-grad); color: #fff; border: none; font-size: 30px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,106,136,0.4); z-index: 90; transition: all 0.2s; }
  .fab:active { transform: scale(0.9); }

  /* 模态框 */
  .modal-mask { position: fixed; inset: 0; background: rgba(90, 74, 82, 0.35); backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px); display: flex; align-items: flex-end; justify-content: center; z-index: 200; }
  .modal { background: var(--card-solid); width: 100%; max-width: 560px;
    border-radius: 24px 24px 0 0; padding: 20px; max-height: 90vh; overflow-y: auto;
    box-shadow: 0 -8px 40px rgba(255,106,136,0.2); animation: slideUp 0.3s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal h3 { margin: 0 0 16px; font-size: 18px; font-weight: 800; color: var(--accent); }
  .modal label { display: block; font-size: 12px; font-weight: 600; color: var(--text-soft); margin: 12px 0 6px; }
  .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 14px;
    background: rgba(255,245,247,0.6); border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .modal textarea { min-height: 110px; resize: vertical; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-actions .btn { flex: 1; padding: 12px; }

  /* Toast */
  #toast { position: fixed; bottom: 92px; left: 50%; transform: translateX(-50%);
    background: var(--card-solid); color: var(--text); padding: 12px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 600; z-index: 300; opacity: 0; transition: all 0.3s; pointer-events: none;
    box-shadow: var(--shadow); max-width: 90%; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  #toast.err { background: linear-gradient(135deg, #ff8a80, #ff5252); color: #fff; }
  #toast.ok { background: linear-gradient(135deg, #81c784, #4caf50); color: #fff; }

  .empty { text-align: center; color: var(--text-soft); padding: 60px 20px; font-size: 14px; }
  .empty .emoji { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.6; }
</style>
</head>
<body>

<header>
  <div class="header-row">
    <h1>🍊 橘瓣记忆库</h1>
    <span style="font-size:12px;color:var(--accent);font-weight:600" id="activePersonaBadge">🌟 当前: 未设置</span>
    <span class="status-dot" id="statusDot"></span>
    <span style="font-size:12px;color:var(--text-soft);font-weight:600" id="statusText">未连接</span>
  </div>
</header>

<!-- 连接区 -->
<div class="connect" id="connectSection">
  <div class="connect-card">
    <div class="title">✨ 欢迎回来</div>
    <div class="desc">填入 API_SECRET 即可连接，无需 Supabase Key 🌸</div>
    <input type="password" id="apiKey" placeholder="🔑 API_SECRET，如 lyy123" autocomplete="off">
    <button class="btn btn-primary" style="width:100%" onclick="connect()">🎀 连接</button>
  </div>
</div>

<!-- 主面板（连接后显示） -->
<div id="mainPanel" class="hidden">
  <div class="tabs">
    <div class="tab active" data-tab="messages" onclick="switchTab('messages')">🧠 精华记忆</div>
    <div class="tab" data-tab="archive" onclick="switchTab('archive')">📜 对话归档</div>
    <div class="tab" data-tab="personas" onclick="switchTab('personas')">🎭 人设管理</div>
  </div>

  <!-- 筛选栏 -->
  <div class="filters" id="filterBar">
    <div class="filter-row">
      <select id="fPersona"><option value="">👥 所有人设</option></select>
    </div>
    <div class="filter-row" id="catFilterRow">
      <select id="fCategory">
        <option value="">🏷️ 全部分类</option>
        <option value="关系">💕 [关系]</option>
        <option value="剧情">📖 [剧情]</option>
        <option value="喜好">💚 [喜好]</option>
        <option value="雷点">🚫 [雷点]</option>
        <option value="设定">⚙️ [设定]</option>
        <option value="档案">📁 [档案]</option>
      </select>
    </div>
    <div class="filter-row" id="roleFilterRow" class="hidden">
      <select id="fRole">
        <option value="">🎭 全部角色</option>
        <option value="user">user</option>
        <option value="assistant">assistant</option>
        <option value="system">system</option>
      </select>
    </div>
    <div class="filter-row">
      <input type="text" id="fKeyword" placeholder="🔍 关键词搜索..." onkeydown="if(event.key==='Enter')loadList(1)">
      <button class="btn btn-sm btn-primary" onclick="loadList(1)">搜索</button>
    </div>
    <div class="filter-row">
      <label style="font-size:12px;color:var(--text-soft);font-weight:600">每页</label>
      <select id="fPageSize" onchange="loadList(1)" style="flex:0 0 auto">
        <option id="opt1"></option>
        <option id="opt2"></option>
        <option id="opt3"></option>
      </select>
    </div>
  </div>

  <!-- 列表 -->
  <div class="list" id="listArea"></div>

  <!-- 分页 -->
  <div class="pager" id="pager"></div>

  <!-- 人设管理区域 -->
  <div class="list hidden" id="personaArea">
    <div style="padding:4px 0 16px">
      <button class="btn btn-primary" style="width:100%" onclick="openPersonaModal()">➕ 新增人设/线路</button>
    </div>
    <div id="personaList"></div>
  </div>
</div>

<button class="fab hidden" id="fabAdd" onclick="openAddModal()">+</button>

<!-- 模态框 -->
<div class="modal-mask hidden" id="modalMask" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<div id="toast"></div>

<script>
let API_KEY = localStorage.getItem('panel_api_key') || '';
let currentTab = 'messages';
let currentPage = 1;
let personas = [];

// ==========================================
// 工具函数
// ==========================================
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 2500);
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function fmtTime(t) {
  if (!t) return '';
  try {
    const d = new Date(t);
    if (isNaN(d)) return String(t).slice(0,16);
    return String(d.getMonth()+1).padStart(2,'0')+'-'+
      String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+
      String(d.getMinutes()).padStart(2,'0');
  } catch(e) { return String(t); }
}

async function api(path, method='GET', body=null) {
  const opts = { method, headers: { 'x-api-key': API_KEY, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || ('HTTP '+res.status));
  return data;
}

function personaSelectOptions(selectedId) {
  let opts = '<option value="">👥 请选择人设/线路</option>';
  for (const p of personas) {
    const sel = (selectedId && p.id === selectedId) ? ' selected' : '';
    opts += `<option value="${esc(p.id)}"${sel}>${esc(p.display_name)}</option>`;
  }
  return opts;
}

// ==========================================
// 连接
// ==========================================
async function connect() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k) { toast('请填入 API_SECRET', 'err'); return; }
  API_KEY = k;
  localStorage.setItem('panel_api_key', k);
  try {
    const res = await api('/api/panel/personas');
    personas = res.personas || [];
    document.getElementById('statusDot').className = 'status-dot ok';
    document.getElementById('statusText').textContent = '已连接';
    document.getElementById('connectSection').classList.add('hidden');
    document.getElementById('mainPanel').classList.remove('hidden');
    document.getElementById('fabAdd').classList.remove('hidden');
    const sel = document.getElementById('fPersona');
    sel.innerHTML = '<option value="">👥 所有人设</option>' +
      personas.map(p => `<option value="${esc(p.id)}">${esc(p.display_name)}</option>`).join('');
    setupPageSizeOptions();
    loadList(1);
    updateActivePersonaBadge(personas);
    toast('连接成功 🌸', 'ok');
  } catch(e) {
    document.getElementById('statusDot').className = 'status-dot err';
    document.getElementById('statusText').textContent = '连接失败';
    toast('连接失败: '+e.message, 'err');
    API_KEY = '';
    localStorage.removeItem('panel_api_key');
  }
}

// ==========================================
// Tab 切换
// ==========================================
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const isPersonaTab = tab === 'personas';
  const isMsg = tab === 'messages';
  if (isPersonaTab) {
    document.getElementById('filterBar').classList.add('hidden');
    document.getElementById('listArea').classList.add('hidden');
    document.getElementById('pager').classList.add('hidden');
    document.getElementById('personaArea').classList.remove('hidden');
    document.getElementById('fabAdd').classList.add('hidden');
    loadPersonas();
    return;
  }
  document.getElementById('filterBar').classList.remove('hidden');
  document.getElementById('listArea').classList.remove('hidden');
  document.getElementById('pager').classList.remove('hidden');
  document.getElementById('personaArea').classList.add('hidden');
  document.getElementById('fabAdd').classList.remove('hidden');
  document.getElementById('catFilterRow').style.display = isMsg ? '' : 'none';
  document.getElementById('roleFilterRow').style.display = isMsg ? 'none' : '';
  setupPageSizeOptions();
  loadList(1);
}

function setupPageSizeOptions() {
  const o1 = document.getElementById('opt1');
  const o2 = document.getElementById('opt2');
  const o3 = document.getElementById('opt3');
  if (currentTab === 'messages') {
    // 精华记忆页：20 / 50（隐藏第三项）
    o1.value = '20'; o1.textContent = '20';
    o2.value = '50'; o2.textContent = '50';
    if (o3) o3.hidden = true;
    if (!o2.selected && !o1.selected) o1.selected = true;
  } else {
    // 对话归档页：5 / 10 / 20（与文档要求一致）
    o1.value = '5'; o1.textContent = '5';
    o2.value = '10'; o2.textContent = '10';
    if (o3) { o3.value = '20'; o3.textContent = '20'; o3.hidden = false; }
    if (!o3 || !o3.selected) {
      if (!o2.selected && !o1.selected) o1.selected = true;
    }
  }
}

function currentTable() { return currentTab === 'messages' ? 'chat_messages' : 'chat_archive'; }

// ==========================================
// 列表加载
// ==========================================
async function loadList(page) {
  currentPage = page || 1;
  const table = currentTable();
  const params = new URLSearchParams();
  params.set('table', table);
  const pid = document.getElementById('fPersona').value;
  if (pid) params.set('assistant_id', pid);
  const kw = document.getElementById('fKeyword').value.trim();
  if (kw) params.set('keyword', kw);
  if (currentTab === 'messages') {
    const cat = document.getElementById('fCategory').value;
    if (cat) params.set('category', cat);
  } else {
    const role = document.getElementById('fRole').value;
    if (role) params.set('role', role);
  }
  params.set('page', currentPage);
  params.set('page_size', document.getElementById('fPageSize').value);

  const area = document.getElementById('listArea');
  area.innerHTML = '<div class="empty"><span class="emoji">⏳</span>加载中...</div>';
  try {
    const res = await api('/api/panel/records?'+params.toString());
    renderList(res);
    renderPager(res);
  } catch(e) {
    area.innerHTML = '<div class="empty"><span class="emoji">😢</span>'+esc(e.message)+'</div>';
    document.getElementById('pager').innerHTML = '';
  }
}

function renderList(res) {
  const area = document.getElementById('listArea');
  const records = res.records || [];
  if (records.length === 0) {
    area.innerHTML = '<div class="empty"><span class="emoji">🌸</span>暂无数据</div>';
    return;
  }
  area.innerHTML = records.map(r => {
    const isMsg = currentTab === 'messages';
    let head = '';
    if (isMsg && r.category) {
      head += `<span class="tag tag-${esc(r.category)}">${esc(r.category)}</span>`;
    }
    if (!isMsg && r.role) {
      head += `<span class="role-tag role-${esc(r.role)}">${esc(r.role)}</span>`;
    }
    head += `<span class="item-time">${esc(fmtTime(r.created_at))}</span>`;
    const isLong = (r.content || '').length > 120;
    const cls = isLong ? 'item-content clamp' : 'item-content';
    let html = `<div class="item">
      <div class="item-head">${head}</div>
      <div class="${cls}" id="content-${esc(r.id)}">${esc(r.content)}</div>`;
    if (isLong) {
      html += `<div class="expand-btn" onclick="toggleExpand('${esc(r.id)}')">展开 ▼</div>`;
    }
    html += `<div class="item-actions">
      <button class="btn btn-sm" onclick="openEditModal('${esc(r.id)}')">✏️ 编辑</button>
      <button class="btn btn-sm btn-danger" onclick="delRecord('${esc(r.id)}')">🗑️ 删除</button>
    </div></div>`;
    return html;
  }).join('');
  window._recordsCache = records;
}

function toggleExpand(id) {
  const el = document.getElementById('content-'+id);
  const btn = el.nextElementSibling;
  if (el.classList.contains('clamp')) {
    el.classList.remove('clamp');
    btn.textContent = '收起 ▲';
  } else {
    el.classList.add('clamp');
    btn.textContent = '展开 ▼';
  }
}

function renderPager(res) {
  const p = document.getElementById('pager');
  const total = res.total || 0;
  const tp = res.total_pages || 0;
  const page = res.page || 1;
  p.innerHTML = `<div class="info">共 ${total} 条，第 ${page}/${tp||1} 页</div>`;
  if (tp <= 1) return;
  const maxBtns = 7;
  let start = Math.max(1, page - 3);
  let end = Math.min(tp, start + maxBtns - 1);
  start = Math.max(1, end - maxBtns + 1);
  let btns = '';
  if (page > 1) btns += `<button class="btn btn-sm" onclick="loadList(${page-1})">‹</button>`;
  for (let i = start; i <= end; i++) {
    btns += `<button class="btn btn-sm ${i===page?'btn-primary':''}" onclick="loadList(${i})">${i}</button>`;
  }
  if (page < tp) btns += `<button class="btn btn-sm" onclick="loadList(${page+1})">›</button>`;
  p.innerHTML += btns;
  p.innerHTML += `<input type="number" min="1" max="${tp}" value="${page}" style="width:60px"
    onchange="loadList(parseInt(this.value))" placeholder="跳转">`;
}

function openEditModal(id) {
  const r = (window._recordsCache || []).find(x => x.id === id);
  if (!r) { toast('记录不存在', 'err'); return; }
  const isMsg = currentTab === 'messages';
  let catField = '';
  if (isMsg) {
    catField = `<label>分类</label><select id="mCategory">
      <option value="关系" ${r.category==='关系'?'selected':''}>💕 [关系]</option>
      <option value="剧情" ${r.category==='剧情'?'selected':''}>📖 [剧情]</option>
      <option value="喜好" ${r.category==='喜好'?'selected':''}>💚 [喜好]</option>
      <option value="雷点" ${r.category==='雷点'?'selected':''}>🚫 [雷点]</option>
      <option value="设定" ${r.category==='设定'?'selected':''}>⚙️ [设定]</option>
      <option value="档案" ${r.category==='档案'?'selected':''}>📁 [档案]</option>
    </select>`;
  } else {
    catField = `<label>角色</label><select id="mRole">
      <option value="user" ${r.role==='user'?'selected':''}>user</option>
      <option value="assistant" ${r.role==='assistant'?'selected':''}>assistant</option>
      <option value="system" ${r.role==='system'?'selected':''}>system</option></select>`;
  }
  document.getElementById('modalContent').innerHTML = `
    <h3>✏️ 编辑</h3>
    <label>人设/线路</label>
    <select id="mPersona">${personaSelectOptions(r.assistant_id || '')}</select>
    ${catField}
    <label>内容</label>
    <textarea id="mContent">${esc(r.content)}</textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitEdit('${esc(id)}')">💾 保存</button>
    </div>`;

}

async function submitAdd() {
  const body = { table: currentTable(), content: document.getElementById('mContent').value.trim() };
  body.assistant_id = document.getElementById('mPersona').value;
  if (currentTab === 'messages') {
    body.category = document.getElementById('mCategory').value;
  } else {
    body.role = document.getElementById('mRole').value;
  }
  try {
    await api('/api/panel/record', 'POST', body);
    toast('新增成功 🌸', 'ok');
    closeModal();
    loadList(currentPage);
  } catch(e) { toast('新增失败: '+e.message, 'err'); }
}

async function submitEdit(id) {
  const body = { table: currentTable(), id };
  body.content = document.getElementById('mContent').value.trim();
  body.assistant_id = document.getElementById('mPersona').value;
  if (currentTab === 'messages') {
    body.category = document.getElementById('mCategory').value;
  } else {
    body.role = document.getElementById('mRole').value;
  }
  try {
    await api('/api/panel/record', 'PATCH', body);
    toast('已保存 💕', 'ok');
    closeModal();
    loadList(currentPage);
  } catch(e) { toast('保存失败: '+e.message, 'err'); }
}

async function delRecord(id) {
  if (!confirm('确认删除？此操作不可恢复。')) return;
  try {
    await api('/api/panel/record', 'DELETE', { table: currentTable(), id });
    toast('已删除 🗑️', 'ok');
    loadList(currentPage);
  } catch(e) { toast('删除失败: '+e.message, 'err'); }
}

function closeModal() { document.getElementById('modalMask').classList.add('hidden'); }

// ==========================================
// 人设/线路管理
// ==========================================
async function loadPersonas() {
  const area = document.getElementById('personaList');
  area.innerHTML = '<div class="empty"><span class="emoji">⏳</span>加载中...</div>';
  try {
    const res = await fetch('/api/panel/personas?all=1', { headers: { 'x-api-key': API_KEY } });
    const data = await res.json();
    const list = data.personas || [];
    if (list.length === 0) {
      area.innerHTML = '<div class="empty"><span class="emoji">🎭</span>暂无人设，点击上方按钮新增</div>';
      return;
    }
    updateActivePersonaBadge(list);

    area.innerHTML = list.map(p => {
      const visTag = p.is_visible === false
        ? '<span class="role-tag role-system" style="background:rgba(156,163,175,0.2);color:#6b7280">隐藏</span>'
        : '<span class="role-tag role-user" style="background:rgba(107,203,119,0.18);color:#16a34a">可见</span>';
      const isActive = p.is_active === true;
      const activeTag = isActive ? '<span class="role-tag role-assistant" style="background:rgba(255,126,179,0.2);color:var(--accent)">🌟 已激活</span>' : '';
      const sp = (p.system_prompt || '').trim();
      const spPreview = sp ? `<div class="item-content clamp" style="font-size:12px;color:var(--text-soft);max-height:3em;margin-top:4px">📝 ${esc(sp)}</div>` : '';
      const activateBtn = isActive
        ? `<button class="btn btn-sm" onclick="toggleActivate('${esc(p.id)}', false)">⭐ 取消激活</button>`
        : `<button class="btn btn-sm btn-primary" onclick="toggleActivate('${esc(p.id)}', true)">🌟 设为当前</button>`;
      return `<div class="item">
        <div class="item-head">
          <span style="font-weight:700;font-size:15px">${esc(p.display_name)}</span>
          ${visTag}${activeTag}
          <span class="item-time">ID: ${esc(p.id)}</span>
        </div>
        <div class="item-content" style="font-size:12px;color:var(--text-soft)">排序: ${esc(p.sort_order!==undefined?p.sort_order:'-')}</div>
        ${spPreview}
        <div class="item-actions">
          ${activateBtn}
          <button class="btn btn-sm" onclick="openPersonaEditModal('${esc(p.id)}')">✏️ 编辑</button>
          <button class="btn btn-sm btn-danger" onclick="delPersona('${esc(p.id)}')">🗑️ 删除</button>
        </div>
      </div>`;
    }).join('');
    window._personaCache = list;
  } catch(e) {
    area.innerHTML = '<div class="empty"><span class="emoji">😢</span>'+esc(e.message)+'</div>';
  }
}

async function toggleActivate(id, activate) {
  try {
    await api('/api/panel/persona', 'PATCH', { id, activate });
    toast(activate ? '已设为当前人设 🌟' : '已取消激活', 'ok');
    loadPersonas();
  } catch(e) { toast('操作失败: '+e.message, 'err'); }
}

async function updateActivePersonaBadge(list) {
  try {
    if (!list) {
      const res = await api('/api/panel/active_persona');
      const p = res.persona;
      if (p) {
        document.getElementById('activePersonaBadge').textContent = '🌟 当前: ' + p.display_name;
      } else {
        document.getElementById('activePersonaBadge').textContent = '🌟 当前: 未设置';
      }
      return;
    }
    const active = list.find(p => p.is_active === true);
    if (active) {
      document.getElementById('activePersonaBadge').textContent = '🌟 当前: ' + active.display_name;
    } else {
      document.getElementById('activePersonaBadge').textContent = '🌟 当前: 未设置';
    }
  } catch(e) {
    document.getElementById('activePersonaBadge').textContent = '🌟 当前: 未设置';
  }
}

function openPersonaModal() {
  document.getElementById('modalContent').innerHTML = `
    <h3>🎭 新增人设/线路</h3>
    <label>人设ID（英文/数字，唯一，如 骆云影_联姻线）</label>
    <input type="text" id="pId" placeholder="如：骆云影_联姻线">
    <label>显示名称（面板上展示的名字）</label>
    <input type="text" id="pName" placeholder="如：骆云影_联姻线">
    <label>排序（数字越小越靠前）</label>
    <input type="number" id="pSort" value="100">
    <label>是否在筛选列表中可见</label>
    <select id="pVisible">
      <option value="true">✅ 可见</option>
      <option value="false">🚫 隐藏</option>
    </select>
    <label>📝 人设提示词（system_prompt，选填）</label>
    <textarea id="pSystemPrompt" placeholder="如：你叫骆云影，性格冷淡但内心温柔...&#10;该人设激活后，会作为 system prompt 注入橘瓣聊天"></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitPersonaAdd()">💾 保存</button>
    </div>`;
  document.getElementById('modalMask').classList.remove('hidden');
}

function openPersonaEditModal(id) {
  const p = (window._personaCache || []).find(x => x.id === id);
  if (!p) { toast('人设不存在', 'err'); return; }
  document.getElementById('modalContent').innerHTML = `
    <h3>✏️ 编辑人设</h3>
    <label>人设ID（不可修改）</label>
    <input type="text" value="${esc(p.id)}" disabled style="opacity:0.6">
    <label>显示名称</label>
    <input type="text" id="pName" value="${esc(p.display_name)}">
    <label>排序</label>
    <input type="number" id="pSort" value="${esc(p.sort_order!==undefined?p.sort_order:100)}">
    <label>是否可见</label>
    <select id="pVisible">
      <option value="true" ${p.is_visible!==false?'selected':''}>✅ 可见</option>
      <option value="false" ${p.is_visible===false?'selected':''}>🚫 隐藏</option>
    </select>
    <label>📝 人设提示词（system_prompt，选填）</label>
    <textarea id="pSystemPrompt" placeholder="如：你叫骆云影，性格冷淡但内心温柔...">${esc(p.system_prompt || '')}</textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitPersonaEdit('${esc(p.id)}')">💾 保存</button>
    </div>`;
  document.getElementById('modalMask').classList.remove('hidden');
}

async function submitPersonaAdd() {
  const body = {
    id: document.getElementById('pId').value.trim(),
    display_name: document.getElementById('pName').value.trim(),
    sort_order: parseInt(document.getElementById('pSort').value) || 100,
    is_visible: document.getElementById('pVisible').value === 'true',
  };
  if (!body.id || !body.display_name) { toast('ID 和名称不能为空', 'err'); return; }
  body.system_prompt = document.getElementById('pSystemPrompt').value.trim();
  try {
    await api('/api/panel/persona', 'POST', body);
    toast('人设已新增 🌸', 'ok');
    closeModal();
    // 刷新本地 personas 缓存 + 筛选下拉
    const res = await api('/api/panel/personas');
    personas = res.personas || [];
    const sel = document.getElementById('fPersona');
    sel.innerHTML = '<option value="">👥 所有人设</option>' +
      personas.map(p => `<option value="${esc(p.id)}">${esc(p.display_name)}</option>`).join('');
    loadPersonas();
  } catch(e) { toast('新增失败: '+e.message, 'err'); }
}

async function submitPersonaEdit(id) {
  const body = {
    id,
    display_name: document.getElementById('pName').value.trim(),
    sort_order: parseInt(document.getElementById('pSort').value) || 100,
    is_visible: document.getElementById('pVisible').value === 'true',
    system_prompt: document.getElementById('pSystemPrompt').value.trim(),
  };
  try {
    await api('/api/panel/persona', 'PATCH', body);
    toast('已保存 💕', 'ok');
    closeModal();
    // 刷新本地 personas 缓存 + 筛选下拉
    const res = await api('/api/panel/personas');
    personas = res.personas || [];
    const sel = document.getElementById('fPersona');
    sel.innerHTML = '<option value="">👥 所有人设</option>' +
      personas.map(p => `<option value="${esc(p.id)}">${esc(p.display_name)}</option>`).join('');
    loadPersonas();
  } catch(e) { toast('保存失败: '+e.message, 'err'); }
}

async function delPersona(id) {
  if (!confirm('确认删除人设「'+id+'」？\n\n注意：这不会删除该人设下的已有记忆数据，只是从人设列表中移除。')) return;
  try {
    await api('/api/panel/persona', 'DELETE', { id });
    toast('已删除 🗑️', 'ok');
    // 刷新本地 personas 缓存 + 筛选下拉
    const res = await api('/api/panel/personas');
    personas = res.personas || [];
    const sel = document.getElementById('fPersona');
    sel.innerHTML = '<option value="">👥 所有人设</option>' +
      personas.map(p => `<option value="${esc(p.id)}">${esc(p.display_name)}</option>`).join('');
    loadPersonas();
  } catch(e) { toast('删除失败: '+e.message, 'err'); }
}

if (API_KEY) { document.getElementById('apiKey').value = API_KEY; }
</script>
