# ==========================================
# 通用 MCP 网关 Docker Compose 配置
# ==========================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并填入配置
#   2. 运行：docker compose up -d
#   3. 查看日志：docker compose logs -f
#   4. 停止：docker compose down

services:
  mcp-gateway:
    build: .
    container_name: mcp-gateway
    restart: unless-stopped        # 容器异常或宿主机重启后自动拉起
    ports:
      - "${PORT:-10000}:10000"     # 左边是宿主机端口，可自由调整
    env_file:
      - .env                       # 从 .env 文件注入所有环境变量
    environment:
      - PORT=10000                 # 容器内监听端口
    # 如果需要持久化日志到宿主机，取消下面注释
    # volumes:
    #   - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:10000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3